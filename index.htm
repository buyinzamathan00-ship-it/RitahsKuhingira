<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ritah Introduction Ceremony</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #121212 0%, #1a1917 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(212, 175, 55, 0.15);
      --gold-primary: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --text-light: #f5f5f7;
      --text-muted: #a1a1a6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
    }

    header {
      padding: 60px 20px 20px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--gold-primary);
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .gold-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
      margin-bottom: 30px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--text-light);
      line-height: 1.2;
    }

    .ampersand {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      color: var(--gold-primary);
      margin: 8px 0;
      display: block;
      opacity: 0.8;
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 35px;
    }

    .hero-container {
      position: relative;
      margin-bottom: 25px;
    }

    .hero-img {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: 2px solid var(--gold-primary);
      object-fit: cover;
      box-shadow: 0 0 25px var(--gold-glow);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .hero-img:hover {
      transform: scale(1.03);
      box-shadow: 0 0 35px rgba(212, 175, 55, 0.6);
    }

    .sub {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-style: italic;
      max-width: 280px;
      line-height: 1.5;
    }

    main {
      padding: 20px;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 30px 25px;
      margin-bottom: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: border 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      border-color: rgba(212, 175, 55, 0.35);
      transform: translateY(-2px);
    }

    .card h3 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--text-light);
      margin-bottom: 20px;
      font-weight: 600;
    }

    .details-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
      max-width: 280px;
      margin: 0 auto 25px auto;
    }

    .detail-item {
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      line-height: 1.6;
    }

    .detail-label {
      color: var(--text-muted);
      font-weight: 400;
    }

    .detail-value {
      color: var(--text-light);
      font-weight: 500;
      text-align: right;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e5c043 0%, #b8921a 100%);
      color: #0d0d0d;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
      transition: all 0.3s ease;
    }

    .btn:hover {
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
      transform: translateY(-1px);
    }

    .countdown-display {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold-primary);
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
      opacity: 0.5;
      line-height: 1.8;
    }
  </style>
</head>

<body>

<header>
  <div class="tagline">Introduction Ceremony</div>
  <div class="gold-divider"></div>

  <h1>Ritah</h1>
  <span class="ampersand">&</span>
  <h2>The Groom</h2>

  <div class="hero-container">
    <!-- Pointing to your cropped image name -->
    <img class="hero-img" src="ritahsface.jpg" alt="Ritah">
  </div>

  <p class="sub">A celebration of love, tradition & union</p>
</header>

<main>
  <section class="card">
    <h3>Ceremony Details</h3>
    <div class="details-grid">
      <div class="detail-item">
        <span class="detail-label">Date</span>
        <span class="detail-value">27 August 2026</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Time</span>
        <span class="detail-value">To be announced</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Venue</span>
        <span class="detail-value">To be announced</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Location</span>
        <span class="detail-value">Kazo, Uganda</span>
      </div>
    </div>

    <a class="btn" href="#">RSVP via WhatsApp</a>
  </section>

  <section class="card">
    <h3>The Countdown</h3>
    <div class="countdown-display" id="countdown">Calculating...</div>
  </section>
</main>

<footer>
  Designed with Elegance &bull; Celebrating Tradition & Love
</footer>

<script>
  const eventDate = new Date("August 27, 2026 00:00:00").getTime();

  const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));

    if (days > 1) {
      document.getElementById("countdown").innerHTML = days + " Days Left";
    } else if (days === 1) {
      document.getElementById("countdown").innerHTML = "1 Day Left";
    } else if (distance < 0) {
      document.getElementById("countdown").innerHTML = "Today is the Ceremony 🎉";
      clearInterval(x);
    } else {
      document.getElementById("countdown").innerHTML = "Happening Tomorrow ✨";
    }
  }, 1000);
</script>

</body>
</html>
